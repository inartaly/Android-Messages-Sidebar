<!DOCTYPE html>
<html>
<head>
  <title>Android Messages Sidebar</title>
  <style>
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden; 
      display: flex;
    }
    iframe { 
      flex-grow: 1; 
      border: none; 
      width: 100%; 
      height: 100%;
    }
  </style>
</head>
<body>
  <iframe src="https://messages.google.com/web" allow="clipboard-read; clipboard-write"></iframe>
</body>
</html>
